syntax = "proto3";

option java_multiple_files = true;
option java_package = "ru.iu3.lab4.grpc";
option java_outer_classname = "VehicleServiceProto";

package vehicle;

service VehicleReferenceService {
  // Проверка существования транспорта по ID
  rpc ValidateVehicle (VehicleRequest) returns (VehicleResponse);
  // Получить список всех доступных ТС (для отображения в консоли)
  rpc GetAllVehicles (GetAllRequest) returns (stream VehicleResponse);
}

message VehicleRequest {
  string vehicle_id = 1;
}

message VehicleResponse {
  string vehicle_id = 1;
  string type = 2;
  bool exists = 3;
}

message GetAllRequest {}